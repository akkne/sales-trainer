services:
  frontend:
    build:
      context: ./src/frontend
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    pull_policy: build
    ports:
      - "3000:3000"
    env_file:
      - ./src/frontend/.env.production
    depends_on:
      - backend
      - loki

  backend:
    build: ./src/backend/api
    pull_policy: build
    ports:
      - "5001:8080"
    env_file:
      - ./src/backend/api/.env.docker
    environment:
      # Secrets interpolated from the root .env
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__BaseUrl=${OPENAI_BASE_URL}
      - OpenAI__ChatCompletionsPath=${OPENAI_CHAT_COMPLETIONS_PATH}
      - Deepgram__ApiKey=${DEEPGRAM_API_KEY}
      - VoicerTts__ApiKey=${VOICER_API_KEY}
      - YandexTts__ApiKey=${YANDEX_TTS_API_KEY}
      - SuperAdmin__Email=${SUPERADMIN_EMAIL}
      - SuperAdmin__Password=${SUPERADMIN_PASSWORD}
      - SuperAdmin__DisplayName=${SUPERADMIN_DISPLAY_NAME}
    volumes:
      - ./src/backend/api/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      loki:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:8
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
