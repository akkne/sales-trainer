services:
  frontend:
    build:
      context: ./src/frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5001
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    environment:
      - LOKI_URL=http://loki:3100
    depends_on:
      - backend
      - loki

  backend:
    build: ./src/backend/api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=salestrainer;Username=st;Password=st_secret
      - ConnectionStrings__Mongo=mongodb://mongo:27017
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR_AT_LEAST_32_CHARS
      - Jwt__Issuer=salestrainer
      - Jwt__Audience=salestrainer
      - Frontend__Url=http://localhost:3000
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Logging__Loki__Url=http://loki:3100
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      loki:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: salestrainer
      POSTGRES_USER: st
      POSTGRES_PASSWORD: st_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U st -d salestrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:8
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
