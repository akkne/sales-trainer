services:
  frontend:
    build:
      context: ./src/frontend
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    pull_policy: build
    # Bound to localhost only: Traefik reaches the container over the docker network.
    # Docker bypasses UFW, so publishing to 0.0.0.0 would expose it to the internet.
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./src/frontend/.env.production
    depends_on:
      - backend
      - loki

  backend:
    build: ./src/backend/api
    pull_policy: build
    # Bound to localhost only: Traefik proxies api.<domain> to this over the docker network.
    ports:
      - "127.0.0.1:5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Secrets interpolated from the root .env; everything else lives in appsettings*.json
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # CORS allow-list: comma-separated origins (local dev + deployed Vercel frontend)
      - Frontend__Url=${FRONTEND_URL:-http://localhost:3000,https://sellevate.vercel.app}
      - Jwt__Key=${JWT_KEY}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - MailerSend__ApiToken=${MAILERSEND_API_TOKEN}
      - MailerSend__FromEmail=${MAILERSEND_FROM_EMAIL}
      - MailerSend__FromName=${MAILERSEND_FROM_NAME:-Sellevate}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__BaseUrl=${OPENAI_BASE_URL}
      - OpenAI__ChatCompletionsPath=${OPENAI_CHAT_COMPLETIONS_PATH}
      - Deepgram__ApiKey=${DEEPGRAM_API_KEY}
      - YandexTts__ApiKey=${YANDEX_TTS_API_KEY}
      - SuperAdmin__Email=${SUPERADMIN_EMAIL}
      - SuperAdmin__Password=${SUPERADMIN_PASSWORD}
      - SuperAdmin__DisplayName=${SUPERADMIN_DISPLAY_NAME}
      - Storage__S3__Endpoint=http://minio:9000
      - Storage__S3__AccessKey=${MINIO_ROOT_USER}
      - Storage__S3__SecretKey=${MINIO_ROOT_PASSWORD}
      - Storage__S3__Bucket=salestrainer-avatars
    volumes:
      - ./src/backend/api/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      loki:
        condition: service_started
      minio:
        condition: service_healthy

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    # Localhost only — object storage must not be reachable from the internet.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Localhost only — never expose the database to the internet.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:8
    volumes:
      - mongo_data:/data/db
    # Localhost only — never expose MongoDB to the internet.
    ports:
      - "127.0.0.1:27017:27017"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # Localhost only — never expose Redis to the internet.
    ports:
      - "127.0.0.1:6379:6379"

  analytics-redis:
    image: redis:7-alpine
    volumes:
      - analytics_redis_data:/data
    # Localhost only — never expose Redis to the internet.
    ports:
      - "127.0.0.1:6380:6379"

  # Single-broker Kafka (KRaft). In-network services use kafka:29092; localhost:9092
  # is published only for host-side debugging.
  kafka:
    image: apache/kafka:3.8.1
    # Localhost only — the broker must not be reachable from the internet.
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    # Localhost only — reach it via SSH tunnel.
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sellevate
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

  # API Gateway (YARP). Single public entry point; in Phase 0 it transparently
  # proxies every path to the monolith. Not yet wired into the frontend/Traefik —
  # the monolith still serves traffic directly until routes are flipped per service.
  ai:
    build:
      context: ./src/backend
      dockerfile: ai-service/Ai/Dockerfile
    pull_policy: build
    # Localhost only — reached through the gateway over the docker network.
    ports:
      - "127.0.0.1:5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=ai;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Mongo=mongodb://mongo:27017
      - ConnectionStrings__Redis=redis:6379
      - Mongo__DatabaseName=sallevate
      - Kafka__BootstrapServers=kafka:29092
      - Frontend__Url=${FRONTEND_URL:-http://localhost:3000,https://sellevate.vercel.app}
      - Jwt__Key=${JWT_KEY}
      - Logging__Loki__Url=http://loki:3100
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__BaseUrl=${OPENAI_BASE_URL}
      - OpenAI__ChatCompletionsPath=${OPENAI_CHAT_COMPLETIONS_PATH}
      - YandexTts__ApiKey=${YANDEX_TTS_API_KEY}
      - GoogleTts__ApiKey=${GOOGLE_TTS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
      loki:
        condition: service_started

  analytics:
    build:
      context: ./src/backend
      dockerfile: analytics-service/Analytics/Dockerfile
    pull_policy: build
    # Localhost only — reached through the gateway over the docker network.
    ports:
      - "127.0.0.1:5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Redis=analytics-redis:6379
      - Kafka__BootstrapServers=kafka:29092
      - Frontend__Url=${FRONTEND_URL:-http://localhost:3000,https://sellevate.vercel.app}
      - Jwt__Key=${JWT_KEY}
      - Logging__Loki__Url=http://loki:3100
    depends_on:
      analytics-redis:
        condition: service_started
      kafka:
        condition: service_started
      loki:
        condition: service_started

  gateway:
    build:
      context: ./src/backend
      dockerfile: gateway/Gateway/Dockerfile
    pull_policy: build
    # Localhost only — published for testing the gateway path during the migration.
    ports:
      - "127.0.0.1:5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Key=${JWT_KEY}
      - Logging__Loki__Url=http://loki:3100
      - ReverseProxy__Clusters__monolith__Destinations__d1__Address=http://backend:8080/
      - ReverseProxy__Clusters__ai__Destinations__d1__Address=http://ai:8080/
      - ReverseProxy__Clusters__analytics__Destinations__d1__Address=http://analytics:8080/
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - backend
      - ai
      - analytics
      - kafka
      - loki

  loki:
    image: grafana/loki:3.4.2
    # Localhost only — logs ingest stays internal.
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./infrastructure/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml

  prometheus:
    image: prom/prometheus:v3.2.1
    # Localhost only — metrics stay internal.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    # Localhost only — reach Grafana via SSH tunnel, or add a Traefik route if you want it public.
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  analytics_redis_data:
  kafka_data:
  loki_data:
  prometheus_data:
  grafana_data:
  minio_data:
