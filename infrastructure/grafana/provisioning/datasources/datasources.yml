apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # Fixed uid so provisioned dashboards can reference it directly. Without this,
    # dashboards using the import placeholder ${DS_PROMETHEUS} fail to resolve the
    # datasource ("datasource not found") and show No data.
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: '15s'

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      derivedFields:
        - name: TraceId
          matcherRegex: '"TraceId":"(\w+)"'
          url: ''
