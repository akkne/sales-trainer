nameOverride: analytics

image:
  repository: ghcr.io/sellevate/analytics-service
  tag: latest

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  Kafka__BootstrapServers: kafka:9092
  Logging__Loki__Url: http://loki:3100

envFromConfigMap: analytics-config
envFromSecret: analytics-secrets

service:
  type: ClusterIP
  port: 80
