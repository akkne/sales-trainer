global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sellevate-gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  - job_name: sellevate-analytics
    static_configs:
      - targets: ['analytics:8080']
    metrics_path: /metrics

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']
    metrics_path: /metrics
