global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sallevate-backend
    static_configs:
      - targets: ['backend:8080']
    metrics_path: /metrics

  - job_name: sellevate-analytics
    static_configs:
      - targets: ['analytics:8080']
    metrics_path: /metrics
