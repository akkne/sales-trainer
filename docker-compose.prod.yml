# Production overlay: Traefik reverse proxy + automatic Let's Encrypt HTTPS.
# Use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Requires in the root .env:
#   ACME_EMAIL  - email for Let's Encrypt notifications
#   FRONTEND_URL=https://sellevate.site  (backend CORS allow-list)
# DNS A records for sellevate.site and *.sellevate.site must point to this server,
# and ports 80 + 443 must be open in the firewall.

services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect all HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt via HTTP-01 challenge
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    depends_on:
      - frontend
      - backend

  frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`sellevate.site`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  backend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.sellevate.site`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  # Grafana published at https://grafana.sellevate.site. Protected by Grafana's own
  # login (anonymous disabled, signup disabled) — set a strong GRAFANA_ADMIN_PASSWORD
  # in the root .env. ROOT_URL is needed so Grafana builds correct absolute links
  # behind the TLS-terminating proxy.
  grafana:
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.sellevate.site
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.sellevate.site`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  letsencrypt:
